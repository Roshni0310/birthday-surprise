<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Hubby ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(to bottom, #000000, #1a001a, #330033);
    color: white;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* Main container */
.container {
    padding: 40px 20px;
}

/* Countdown */
#countdown {
    font-size: 24px;
    color: #ff66cc;
    text-shadow: 0 0 15px #ff66cc;
    margin-top: 40px;
}

/* Button */
button {
    padding: 12px 28px;
    font-size: 16px;
    background: linear-gradient(45deg, #ff4da6, #ff66cc);
    border: none;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px #ff4da6;
    transition: 0.4s ease;
    margin-top: 20px;
}

button:hover {
    transform: scale(1.1);
}

/* Message */
#message {
    display: none;
    margin-top: 30px;
    animation: fadeIn 2s ease forwards;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #ff66cc;
    text-shadow: 0 0 25px #ff66cc;
}

#typewriter {
    width: 90%;
    margin: auto;
    margin-top: 20px;
    font-size: 17px;
    line-height: 1.8;
    min-height: 120px;
}

/* Photo */
#photoSection {
    display: none;
    margin-top: 20px;
    animation: fadeIn 2s ease forwards;
}

#photoSection img {
    width: 80%;
    max-width: 300px;
    border-radius: 20px;
    box-shadow: 0 0 30px #ff66cc;
    border: 3px solid #ff66cc;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    color: #ff4da6;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

</style>
</head>

<body>

<div class="container">

    <div id="countdown"></div>

    <div id="unlock" style="display:none;">
        <button onclick="unlock()">Unlock My Heart ❤️</button>
    </div>

    <div id="message">
        <h1>Happy Birthday, My Hubby ❤️</h1>
        <div id="typewriter"></div>
        <button onclick="showPhoto()">See Our Memory 📸</button>

        <div id="photoSection">
            <img src="photo.jpg" alt="Our Memory">
        </div>
    </div>

</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* Countdown */
let seconds = 5;
let countdown = document.getElementById("countdown");

let timer = setInterval(function() {
    countdown.innerHTML = "Countdown: " + seconds + "s";
    seconds--;

    if (seconds < 0) {
        clearInterval(timer);
        countdown.innerHTML = "It's Time ❤️";
        document.getElementById("unlock").style.display = "block";
    }
}, 1000);

/* Unlock */
function unlock() {
    document.getElementById("unlock").style.display = "none";
    document.getElementById("message").style.display = "block";

    let music = document.getElementById("bgMusic");
    music.play().catch(error => {
        console.log(error);
    });

    typeWriter();
}

/* Typewriter */
let text = "Ahoo... today the most special person in my life was born. Even though miles separate us, my heart feels closest to you. You are my comfort, my peace, my home. One day I will celebrate this birthday in your arms. Until then, this little website carries all my love for you. I love you forever, my babbiiii, my shona. ❤️";

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

/* Show Photo */
function showPhoto() {
    document.getElementById("photoSection").style.display = "block";
}

/* Floating hearts */
setInterval(function() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 500);

</script>

</body>
</html>
