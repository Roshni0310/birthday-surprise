<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Hubby ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: radial-gradient(circle at center, #1a001a, #000000);
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;   /* allow vertical scroll */
}

/* COUNTDOWN */
#countdownScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a001a, #000000);
    z-index: 10;
}

#countdownNumber {
    font-size: 100px;
    font-weight: bold;
    color: #ff66cc;
    text-shadow: 0 0 20px #ff66cc, 0 0 40px #ff3399;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

#countdownText {
    margin-top: 15px;
    font-size: 18px;
    color: #ff99dd;
}

button {
    padding: 12px 28px;
    font-size: 16px;
    background: linear-gradient(45deg, #ff4da6, #ff66cc);
    border: none;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px #ff4da6;
    margin-top: 25px;
}

button:hover {
    transform: scale(1.1);
}

/* MAIN CONTENT */
#mainContent {
    display: none;
    padding: 40px 20px 100px 20px;
    text-align: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #ff66cc;
    text-shadow: 0 0 25px #ff66cc;
}

#typewriter {
    margin-top: 20px;
    font-size: 17px;
    line-height: 1.8;
}

#photoSection {
    display: none;
    margin-top: 30px;
}

#photoSection img {
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    border: 3px solid #ff66cc;
    box-shadow: 0 0 30px #ff66cc;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -20px;
    color: #ff4da6;
    animation: float 6s linear infinite;
    z-index: 20; /* <- ensure hearts float above countdown screen */
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

</style>
</head>

<body>

<div id="countdownScreen">
    <div id="countdownNumber">5</div>
    <div id="countdownText">Until something magical ❤️</div>
    <div id="unlockSection" style="display:none;">
        <button onclick="unlock()">Unlock My Heart ❤️</button>
    </div>
</div>

<div id="mainContent">
    <h1>Happy Birthday, My Hubby ❤️</h1>
    <div id="typewriter"></div>

    <!-- Updated Button Text -->
    <button onclick="startPhotos()">Click Here</button>

    <div id="photoSection">
        <img id="sliderImage" src="photo1.jpeg">
        <br>
        <button onclick="nextPhoto()">Next ❤️</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* COUNTDOWN */
let seconds = 5;
let number = document.getElementById("countdownNumber");
let unlockSection = document.getElementById("unlockSection");

let timer = setInterval(function() {
    number.innerHTML = seconds;
    seconds--;

    if (seconds < 0) {
        clearInterval(timer);
        number.innerHTML = "❤️";
        unlockSection.style.display = "block";
    }
}, 1000);

function unlock() {
    document.getElementById("countdownScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("bgMusic").play().catch(()=>{});
    typeWriter();
}

/* MESSAGE */
let text = `Happy Birthday to the man who holds my heart, even from miles away. ❤️

Distance may keep us apart physically, but it has never reduced what I feel for you. Every day with you, even through a screen, is my favorite part of the day.

You came into my life quietly and became my biggest comfort, my safest place, my favorite person.
I pray this year gives you success, peace, happiness and brings us closer to the day we don’t have to count miles anymore.

On your birthday, I just want you to know, I am so proud of you, so grateful for you, and so deeply in love with you.`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 30);
    }
}

/* PHOTO SLIDER */
let currentPhoto = 1;
const totalPhotos = 10;

function startPhotos() {
    document.getElementById("photoSection").style.display = "block";
    document.getElementById("photoSection").scrollIntoView({behavior:"smooth"});
}

function nextPhoto() {
    currentPhoto++;
    if (currentPhoto > totalPhotos) currentPhoto = 1;

    document.getElementById("sliderImage").src =
        "photo" + currentPhoto + ".jpeg";
}

/* HEARTS (PETALS) - START IMMEDIATELY */
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

// Start petals immediately
setInterval(createHeart, 500);

</script>

</body>
</html>
